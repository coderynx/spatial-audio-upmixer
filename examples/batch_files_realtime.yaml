# Batch — cherry-picked files from different directories, realtime mode
#
# Process specific files regardless of where they live.
# Realtime mode is fast; no stem separation dependency required.
#
# Usage:
#   upmixer --manifest examples/batch_files_realtime.yaml

version: "1.0"

metadata:
  name: "Realtime Batch — 5.1"
  description: "Adaptive multi-source batch upmix to standard 5.1 WAV"

# ── Engine ────────────────────────────────────────────────────────────────────
engine:
  mode: realtime

# ── Mixing ────────────────────────────────────────────────────────────────────
mixing:
  channel_layout: 5.1
  spatial:
    profile: balanced
    intensity: 0.7

# ── Output format — standard multichannel WAV ─────────────────────────────────
format:
  type: wav
  subtype: PCM_24
  sample_rate: 48000

# ── Mastering ─────────────────────────────────────────────────────────────────
mastering:
  loudness:
    normalize: true
    target: -18.0
    max_tp: -1.0

# ── Assets ────────────────────────────────────────────────────────────────────
assets:
  - input:  /albums/artist1/track01.wav
    output: /path/to/output/track01_51.wav

  - input:  /archive/remasters/bonus_track.flac
    output: /path/to/output/bonus_track_51.wav

  - input:  /downloads/collab_feat.wav
    output: /path/to/output/collab_feat_51.wav

  - input:  /projects/mix_session/final_stereo.wav
    output: /path/to/output/final_stereo_51.wav
