# Stem-separation upmix → 7.1.4 WAV
#
# Best quality spatial upmix for studio / mastering use.
# Requires: pip install "upmixer[separation-cpu]"
#
# Usage:
#   upmixer --manifest stem_714.yaml

version: "1.0"

# ── Engine ────────────────────────────────────────────────────────────────────
engine:
  mode: stem
  # stem_model: htdemucs_6s.yaml               # 6-stem model
  # stem_model: BS-Roformer-Viperx-1297.ckpt   # high-quality RoFormer
  # stem_cache_dir: /tmp/upmixer_stems         # skip re-separation on repeated test runs

# ── Mixing (stem mode only) ───────────────────────────────────────────────────
mixing:
  channel_layout: 7.1.4
  # Stem rebalance: bring vocals forward, tighten bass
  # stem_rebalance:
  #   Vocals: +1.0
  #   Bass:   +0.5
  #   Drums:  -0.5
  # Per-stem EQ
  # stem_eq:
  #   Vocals: vocal-presence
  #   Bass:   bass-warmth
  #   Drums:  drums-punch

# ── Mastering ─────────────────────────────────────────────────────────────────
mastering:
  eq:
    profile: spatial-present  # adds presence and definition to instruments
    strength: 0.8
  # Reference matching — spectral + RMS matching to a reference track (independent of eq)
  # match_reference:
  #   path: reference_714.wav
  #   strength: 0.5
  compressor:
    profile: transparent      # very gentle — preserves studio dynamics
  # bass:
  #   profile: enhance
  #   lfe_gain_db: 1.0
  loudness:
    normalize: true
    target: -18.0
    max_tp: -1.0

# ── Processing ────────────────────────────────────────────────────────────────
# Uncomment to test on a 30 s excerpt before committing to a full run.
# processing:
#   preview: true
#   preview_duration: 30.0

# ── Assets ────────────────────────────────────────────────────────────────────
assets:
  - input:  stereo.flac
    output: stem_714.wav
