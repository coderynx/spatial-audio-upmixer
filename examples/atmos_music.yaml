# ADM-BWF music-authoring bed — 7.1.4
#
# Produces a 24-bit, 48 kHz channel bed with ADM metadata for downstream
# authoring, QC, and encoding. It is not a distribution codec bitstream.
#
# Usage:
#   upmixer --manifest examples/atmos_music.yaml

version: "1.0"

metadata:
  name: "7.1.4 ADM-BWF Music Bed"
  description: "Spatial Audio Upmixer bed for downstream immersive authoring"

# ── Engine ────────────────────────────────────────────────────────────────────
engine:
  mode: stem
  stems: [vocals, bass, drums, guitar, piano, other]
  stem_silence_skip: true
  # stem_cache_dir: /tmp/upmixer_stems

# ── Mixing (stem mode only) ───────────────────────────────────────────────────
mixing:
  channel_layout: 7.1.4
  stem_source_anchor_strength: 0.5
  spatial:
    profile: spacious
    intensity: 0.8
  # Stem rebalance — per-stem gain adjustments in dB
  # stem_rebalance:
  #   Vocals: +1.5        # bring vocals forward
  #   Drums:  -0.5        # reduce percussion aggression
  #   Bass:   +0.5        # add bass weight
  # Per-stem EQ — optional tonal shaping per stem
  # stem_eq:
  #   Vocals: vocal-presence
  #   Bass:   bass-warmth
  #   Other:  other-air

# ── Output format — ADM-BWF authoring bed ─────────────────────────────────────
format:
  type: adm-bwf
  subtype: PCM_24
  sample_rate: 48000

# ── Mastering ─────────────────────────────────────────────────────────────────
mastering:
  eq:
    profile: atmos-streaming  # tonal preset name; not a delivery certification
    strength: 0.8
  # Reference matching — spectral + RMS matching to a reference track (independent of eq)
  # match_reference:
  #   path: reference_atmos.wav
  #   strength: 0.5
  compressor:
    profile: glue
  loudness:
    normalize: true
    target: -18.0
    max_tp: -1.0

# ── Processing ────────────────────────────────────────────────────────────────
# processing:
#   preview: true
#   preview_duration: 30.0
#   preview_start: 60.0       # start at 60 s (default: auto-center)

# ── Assets ────────────────────────────────────────────────────────────────────
assets:
  - input:  stereo.flac
    output: atmos_music.wav
