# Dolby Atmos Music Master Delivery — streaming platforms
#
# Spec: Dolby Atmos Music Master Delivery Specification v2022.07
# Target: Apple Music, Amazon Music, Tidal
#
# Usage:
#   upmixer --manifest atmos_music.yaml

version: "1.0"

metadata:
  name: "Atmos Music Master"
  description: "Dolby Atmos Music Master Delivery — streaming platforms"

# ── Engine ────────────────────────────────────────────────────────────────────
engine:
  mode: stem              # stem separation: better spatial quality, slower
  # stem_model: BS-Roformer-SW.ckpt   # override default htdemucs_ft

# ── Mixing (stem mode only) ───────────────────────────────────────────────────
mixing:
  channel_layout: 7.1.4  # full Dolby Atmos bed (12 channels)
  # Stem rebalance — per-stem gain adjustments in dB
  # stem_rebalance:
  #   Vocals: +1.5        # bring vocals forward
  #   Drums:  -0.5        # reduce percussion aggression
  #   Bass:   +0.5        # add bass weight
  # Per-stem EQ — optional tonal shaping per stem
  # stem_eq:
  #   Vocals: vocal-presence
  #   Bass:   bass-warmth
  #   Other:  other-air

# ── Output format — Dolby Atmos Music Master Delivery Specification v2022.07 ──
format:
  type: adm-bwf           # ITU-R BS.2076-2 ADM-BWF container (WAV)
  subtype: PCM_24         # 24-bit LPCM (spec requirement)
  sample_rate: 48000      # 48 kHz (spec requirement)

# ── Mastering ─────────────────────────────────────────────────────────────────
mastering:
  eq:
    profile: atmos-streaming  # subtle bass warmth + presence + air shelf
    strength: 1.0             # 0.0 = bypass → 1.0 = full effect
  # Reference matching — spectral + RMS matching to a reference track (independent of eq)
  # match_reference:
  #   path: reference_atmos.wav
  #   strength: 0.5
  compressor:
    profile: glue
  loudness:
    normalize: true
    target: -18.0             # Atmos Music spec: -18 LKFS
    max_tp: -1.0              # -1 dBTP true peak ceiling

# ── Processing ────────────────────────────────────────────────────────────────
# processing:
#   preview: true
#   preview_duration: 30.0
#   preview_start: 60.0       # start at 60 s (default: auto-center)

# ── Assets ────────────────────────────────────────────────────────────────────
assets:
  - input:  stereo.flac
    output: atmos_music.wav   # ADM-BWF uses WAV container
    # stem_cache_dir: /tmp/upmixer_stems   # cache stems for faster re-runs
