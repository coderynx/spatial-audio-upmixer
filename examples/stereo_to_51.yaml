# Stereo → 5.1 quick upmix
#
# Fast realtime mode (coherence-based STFT). Works on any stereo input.
# No stem separation dependency required.
#
# Usage:
#   upmixer --manifest stereo_to_51.yaml

version: "1.0"

# ── Engine ────────────────────────────────────────────────────────────────────
engine:
  mode: realtime

# ── Mixing ────────────────────────────────────────────────────────────────────
mixing:
  channel_layout: 5.1

# ── Routing ───────────────────────────────────────────────────────────────────
routing:
  center_gain:   0.85   # center channel (lead vocals / dialog)
  surround_gain: 0.60   # side surrounds
  lfe_gain:      0.50   # LFE sub channel
  lfe_cutoff:    120    # LFE low-pass cutoff in Hz

# ── Mastering ─────────────────────────────────────────────────────────────────
mastering:
  eq:
    profile: spatial-warm   # adds body to streaming-mastered stereo sources
    strength: 0.7
  # Reference matching — spectral + RMS matching to a reference track (independent of eq)
  # match_reference:
  #   path: reference_51.wav
  #   strength: 0.5
  # Bus compression — omitted by default for realtime (preserve dynamics)
  # compressor:
  #   profile: transparent
  loudness:
    normalize: true
    target: -18.0
    max_tp: -1.0

# ── Processing ────────────────────────────────────────────────────────────────
# processing:
#   preview: true
#   preview_duration: 30.0

# ── Assets ────────────────────────────────────────────────────────────────────
assets:
  - input:  stereo.wav
    output: surround_51.wav
